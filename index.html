<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnaud SIMART — Facilitateur & Formateur</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

/* HERO */
.hero {
  background:var(--bleu);
  color:white;
  padding:80px 60px;
  position:relative;
  overflow:hidden;
}

.hero::before {
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  top:-200px;
  right:-150px;
}

.hero::after {
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:rgba(247,215,116,0.08);
  bottom:-100px;
  left:10%;
}

.hero-inner {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:1.3fr 0.7fr;
  gap:60px;
  align-items:center;
  position:relative;
  z-index:1;
}

.hero h1 {
  font-size:58px;
  line-height:1.05;
  margin-bottom:20px;
  font-weight:800;
}

.hero h1 em {
  font-style:normal;
  color:var(--jaune);
}

.hero-desc {
  font-size:19px;
  opacity:0.9;
  max-width:600px;
  margin-bottom:35px;
}

.signature {
  font-family:'Patrick Hand', cursive;
  color:var(--jaune);
  font-size:28px;
  margin-bottom:35px;
}

.hero-btns {
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.hero-photo-wrap {
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-photo {
  width:320px;
  height:320px;
  border-radius:50%;
  object-fit:cover;
  object-position:center top;
  border:5px solid var(--jaune);
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* STATS */
.stats-bar {
  background:var(--jaune);
  padding:30px 60px;
}

.stats-inner {
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  text-align:center;
}

.stat-item strong {
  display:block;
  font-size:38px;
  font-weight:800;
  color:var(--bleu);
  line-height:1;
}

.stat-item span {
  font-size:13px;
  color:#444;
  font-weight:500;
}

/* CONFIANCE */
.confiance {
  background:white;
  padding:34px 40px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}

.confiance-inner {
  max-width:1200px;
  margin:auto;
  text-align:center;
}

.confiance-label {
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#888;
  margin-bottom:18px;
  font-weight:700;
}

.confiance-logos {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:18px;
}

.confiance-logos span {
  background:var(--gris);
  color:var(--bleu);
  padding:12px 20px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
  transition:0.2s;
}

.confiance-logos span:hover {
  background:var(--jaune);
  transform:translateY(-2px);
}

/* PRATICIEN */
.praticien {
  background:white;
  border-radius:32px;
  margin:0 40px;
  padding:60px;
  box-shadow:0 12px 40px rgba(0,0,0,0.07);
  margin-top:-20px;
  position:relative;
  z-index:2;
}

.praticien-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:center;
}

.praticien-text p {
  font-size:17px;
  color:#444;
  line-height:1.8;
  margin-bottom:20px;
}

.praticien-cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.mini-card {
  background:var(--gris);
  border-radius:18px;
  padding:22px;
  transition:0.25s ease;
}

.mini-card:hover {
  background:var(--jaune);
  transform:translateY(-3px);
}

.mini-card .icon {
  font-size:28px;
  margin-bottom:10px;
}

.mini-card h4 {
  color:var(--bleu);
  font-size:16px;
  font-weight:700;
  margin-bottom:8px;
}

.mini-card p {
  font-size:14px;
  color:#2b2b2b;
  line-height:1.6;
}

.mini-card:hover p {
  color:#1A1A1A;
}

/* FORMATIONS */
.formations-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.formation-card {
  background:white;
  border-radius:24px;
  padding:32px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  border-top:4px solid var(--corail);
  transition:0.25s ease;
  text-decoration:none;
  color:var(--noir);
  display:block;
}

.formation-card:hover {
  transform:translateY(-5px);
  box-shadow:0 16px 40px rgba(0,0,0,0.12);
}

.formation-card .tag {
  font-size:12px;
  font-weight:600;
  color:var(--corail);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-bottom:12px;
}

.formation-card h3 {
  color:var(--bleu);
  font-size:20px;
  margin-bottom:10px;
}

.formation-card p {
  font-size:14px;
  color:#666;
  line-height:1.6;
}

.formation-card .arrow {
  display:inline-block;
  margin-top:16px;
  color:var(--corail);
  font-weight:700;
  font-size:14px;
}

/* GALERIE */
.home-gallery {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:28px;
}

.home-gallery a {
  display:block;
  position:relative;
  overflow:hidden;
  border-radius:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  background:white;
}

.home-gallery img {
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  display:block;
  transition:0.35s ease;
}

.home-gallery a:hover img {
  transform:scale(1.05);
}

.home-gallery .wide {
  grid-column:span 2;
}

.home-gallery .wide img {
  aspect-ratio:2 / 1;
}

.home-gallery-caption {
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:18px;
  color:white;
  font-size:14px;
  font-weight:700;
  background:linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0));
}

.gallery-proof {
  border:4px solid var(--jaune);
}

/* TÉMOIGNAGE */
.temoignage-vedette {
  background:var(--bleu);
  border-radius:32px;
  padding:60px;
  color:white;
  text-align:center;
  margin-top:30px;
}

.temoignage-vedette .quote {
  font-size:72px;
  font-family:'Patrick Hand', cursive;
  color:var(--jaune);
  line-height:0.5;
  margin-bottom:20px;
  display:block;
}

.temoignage-vedette p {
  font-size:20px;
  font-style:italic;
  max-width:750px;
  margin:0 auto 20px;
  opacity:0.95;
  line-height:1.7;
}

.temoignage-vedette cite {
  font-size:14px;
  opacity:0.65;
  font-style:normal;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

/* CTA */
.cta-section {
  text-align:center;
  padding:80px 40px;
}

.cta-section h2 {
  font-size:40px;
  color:var(--bleu);
  margin-bottom:16px;
  font-weight:800;
}

.cta-section p {
  font-size:18px;
  color:#555;
  max-width:600px;
  margin:0 auto 30px;
}

/* RESPONSIVE */
@media(max-width:900px) {

  .hero {
    padding:60px 25px;
  }

  .hero-inner {
    grid-template-columns:1fr;
  }

  .hero h1 {
    font-size:38px;
  }

  .hero-photo {
    width:220px;
    height:220px;
  }

  .hero-photo-wrap {
    order:-1;
  }

  .stats-bar {
    padding:25px;
  }

  .stats-inner {
    grid-template-columns:repeat(2,1fr);
  }

  .confiance {
    padding:28px 20px;
  }

  .confiance-logos {
    gap:10px;
  }

  .confiance-logos span {
    font-size:13px;
    padding:10px 16px;
  }

  .praticien {
    margin:0 20px;
    padding:35px 25px;
  }

  .praticien-grid {
    grid-template-columns:1fr;
    gap:30px;
  }

  .temoignage-vedette {
    padding:40px 25px;
  }

  .temoignage-vedette p {
    font-size:17px;
  }

  .home-gallery {
    grid-template-columns:1fr 1fr;
  }

  .home-gallery .wide {
    grid-column:span 2;
  }
}

@media(max-width:520px) {

  .home-gallery {
    grid-template-columns:1fr;
  }

  .home-gallery .wide {
    grid-column:span 1;
  }

  .home-gallery .wide img {
    aspect-ratio:1;
  }
}

</style>
</head>
